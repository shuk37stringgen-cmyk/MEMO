<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>カラーメモ</title>
    <link rel="stylesheet" href="StyleSheet1.css">
</head>
<body>
   
    <div id="splash-screen">
        <div class="splash-logo">カラーメモ</div>
    </div>

  
    <div class="app-header">
        <div class="logo">カラーメモ</div>
        <div class="header-actions">
            <span id="edit-guide-text" class="guide-text"></span>
            <button id="edit-mode-btn" class="btn-edit">編集モード：OFF</button>
            <button id="open-create-modal-btn" class="btn-new">新規メモ</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div id="folder-tabs" class="folder-tabs"></div>
            <button id="open-folder-modal-btn" class="btn-add-folder">＋</button>
        </div>

        <div id="dashboard" class="dashboard">
            <div id="resize-handle" style="display:none; position:absolute; width:12px; height:12px; background:#333; border:2px solid white; cursor:se-resize; z-index:1500; border-radius:3px;"></div>

            <div id="quick-settings" style="display:none; position:absolute; background:white; padding:12px; border:2px solid #333; border-radius:8px; z-index:2000; box-shadow: 0 4px 10px rgba(0,0,0,0.15); width: 130px; box-sizing: border-box;">
                <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:4px;">カラー:</label>
                <input type="color" id="quick-color" style="width:100%; margin-bottom:10px; cursor:pointer;"><br>
                <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:12px; cursor:pointer;">
                    <input type="checkbox" id="quick-lock"> ロックする
                </label>
                <button id="quick-settings-close-btn" style="width:100%; padding:5px; font-size:11px; font-weight:bold; background:#333; color:white; border:none; border-radius:4px; cursor:pointer;">閉じる</button>
            </div>
        </div>
    </div>

    <div id="create-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>新規メモ設定</h3>
            <div class="form-group">
                <label>タイトル:</label>
                <input type="text" id="new-title">
            </div>
            <div class="form-group">
                <label>カラー:</label>
                <input type="color" id="new-color" value="#ffffcc">
            </div>
            <div class="form-group">
                <label>形:</label>
                <select id="new-shape">
                    <option value="shape-square">四角</option>
                    <option value="shape-circle">丸</option>
                    <option value="shape-image-rect">太枠丸四角（黒枠）</option>
                </select>
            </div>
            <div class="form-group-checkbox">
                <label><input type="checkbox" id="new-lock"> ロックする</label>
            </div>
            <div class="modal-actions">
                <button id="create-cancel-btn" class="btn-cancel">キャンセル</button>
                <button id="create-submit-btn" class="btn-submit">作成</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content large-modal">
            <h3>メモ編集</h3>
            <div class="form-group">
                <input type="text" id="edit-title" placeholder="タイトル">
            </div>
            <div class="form-group">
                <textarea id="edit-content" placeholder="ここに内容を入力..."></textarea>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                <label style="font-size: 16px; margin: 0;">カラー変更:</label>
                <input type="color" id="edit-color" style="width:60px; height:35px; cursor:pointer;">
            </div>
            <div class="modal-actions" style="margin-top: 30px;">
                <button id="edit-delete-btn" class="btn-danger" style="margin-right: auto;">このメモを削除</button>
                <button id="edit-cancel-btn" class="btn-cancel">キャンセル</button>
                <button id="edit-save-btn" class="btn-submit">変更を保存</button>
            </div>
        </div>
    </div>

    <div id="folder-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>新規フォルダ作成</h3>
            <div class="form-group">
                <label>フォルダ名（タブの見出し）:</label>
                <input type="text" id="folder-title">
            </div>
            <div class="form-group">
                <label>タブのカラー:</label>
                <select id="folder-color">
                    <option value="tab-purple">紫</option>
                    <option value="tab-red">赤</option>
                    <option value="tab-blue">青</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="folder-cancel-btn" class="btn-cancel">キャンセル</button>
                <button id="folder-submit-btn" class="btn-submit">作成</button>
            </div>
        </div>
    </div>

    <div id="folder-edit-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>フォルダ編集</h3>
            <div class="form-group">
                <label>フォルダ名（タブの見出し）:</label>
                <input type="text" id="folder-edit-title">
            </div>
            <div class="form-group">
                <label>タブのカラー:</label>
                <select id="folder-edit-color">
                    <option value="tab-purple">紫</option>
                    <option value="tab-red">赤</option>
                    <option value="tab-blue">青</option>
                </select>
            </div>
            <div class="modal-actions" style="margin-top: 20px;">
                <button id="folder-edit-delete-btn" class="btn-danger" style="margin-right: auto;">削除</button>
                <button id="folder-edit-cancel-btn" class="btn-cancel">キャンセル</button>
                <button id="folder-edit-save-btn" class="btn-submit">変更を保存</button>
            </div>
        </div>
    </div>

    <script src="Script1.js"></script>
</body>
</html>
